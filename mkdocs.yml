site_name: ValkeyCluster Operator
site_description: A Kubernetes operator that manages a sharded, highly-available Valkey Cluster declaratively.
site_url: https://razkevich.github.io/valkeycluster-operator/
repo_url: https://github.com/razkevich/valkeycluster-operator
repo_name: razkevich/valkeycluster-operator
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  icon:
    logo: material/database
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Overview: index.md
  - Architecture: walkthrough.md
  - Day-2 Operations: day-2-operations.md
  - Reconcile Loop & Edge Cases: reconcile-edge-cases.md
  - Settings for Performance & HA: settings.md
  - Testing & Verification: manual-verification.md
  - AI Development Methodology: ai-development.md
